<!doctype html>
<html lang="en">
  <head>
    <!-- ============================================================
         META & SEO
    ============================================================ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Personal portfolio of Allen Del Valle — a passionate developer crafting clean, purposeful digital experiences."
    />
    <meta name="author" content="Allen Del Valle" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph (for link previews on social media) -->
    <meta property="og:title" content="Allen Del Valle — Portfolio" />
    <meta
      property="og:description"
      content="Personal portfolio showcasing projects, skills, and a conversational AI assistant."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com" />

    <title>Allen Del Valle — Portfolio</title>

    <!-- ============================================================
         GOOGLE FONTS
         Outfit → headings | DM Sans → body text
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- React mount point -->
    <div id="root"></div>

    <!-- Scripts — Load order: pdfjs (for certifications) → config.js (local key) → React bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="config.js" defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
